<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1600" preserveAspectRatio="xMidYMax slice">
  <!-- Solo Japanisch Learning – Anime-Tagszene: Schule unter strahlend blauem
       Sommerhimmel mit großen Kumuluswolken. Quadratische Leinwand,
       unten verankert, damit Desktop UND Handy gut beschnitten werden. -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#2e7fd0"/>
      <stop offset="0.4"  stop-color="#5aa7e8"/>
      <stop offset="0.7"  stop-color="#8ec8f2"/>
      <stop offset="0.84" stop-color="#c8e6f9"/>
      <stop offset="1"    stop-color="#a9d6f2"/>
    </linearGradient>
    <radialGradient id="sunglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"    stop-color="#fffbe8" stop-opacity="0.95"/>
      <stop offset="0.25" stop-color="#fff3c4" stop-opacity="0.45"/>
      <stop offset="1"    stop-color="#fff3c4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="haze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Himmel -->
  <rect width="1600" height="1600" fill="url(#sky)"/>

  <!-- Sonne mit weichem Glühen -->
  <circle cx="1180" cy="700" r="330" fill="url(#sunglow)"/>
  <circle cx="1180" cy="700" r="66" fill="#fffdf2"/>

  <!-- Vogelschwarm (die klassischen Anime-"V"s) -->
  <g stroke="#2a4a6a" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.75">
    <path d="M420 340 q14 -14 28 0 M448 340 q14 -14 28 0"/>
    <path d="M530 300 q12 -12 24 0 M554 300 q12 -12 24 0"/>
    <path d="M480 400 q10 -10 20 0 M500 400 q10 -10 20 0"/>
    <path d="M900 250 q13 -13 26 0 M926 250 q13 -13 26 0"/>
  </g>

  <!-- Hohe Schleierwolken -->
  <g fill="#ffffff" opacity="0.5">
    <ellipse cx="300"  cy="220" rx="220" ry="16"/>
    <ellipse cx="1250" cy="300" rx="260" ry="14"/>
    <ellipse cx="700"  cy="150" rx="180" ry="12"/>
  </g>

  <!-- Große Kumuluswolke links (Anime-Sommerwolke) -->
  <g>
    <g fill="#dceafa">
      <ellipse cx="360" cy="1010" rx="230" ry="52"/>
      <ellipse cx="530" cy="1020" rx="150" ry="40"/>
    </g>
    <g fill="#ffffff">
      <ellipse cx="300" cy="960"  rx="130" ry="75"/>
      <ellipse cx="420" cy="920"  rx="150" ry="95"/>
      <ellipse cx="545" cy="965"  rx="110" ry="65"/>
      <ellipse cx="215" cy="1000" rx="90"  ry="50"/>
      <ellipse cx="470" cy="1000" rx="120" ry="55"/>
    </g>
  </g>

  <!-- Kumuluswolke rechts, halb hinter der Stadt -->
  <g>
    <g fill="#d6e6f8">
      <ellipse cx="1300" cy="1120" rx="240" ry="48"/>
    </g>
    <g fill="#ffffff">
      <ellipse cx="1240" cy="1060" rx="140" ry="80"/>
      <ellipse cx="1380" cy="1080" rx="120" ry="66"/>
      <ellipse cx="1140" cy="1105" rx="95"  ry="48"/>
      <ellipse cx="1470" cy="1115" rx="90"  ry="44"/>
    </g>
  </g>

  <!-- kleine ferne Wolken am Horizont -->
  <g fill="#ffffff" opacity="0.85">
    <ellipse cx="760"  cy="1150" rx="120" ry="22"/>
    <ellipse cx="900"  cy="1170" rx="90"  ry="16"/>
    <ellipse cx="80"   cy="1130" rx="110" ry="20"/>
  </g>

  <!-- Lichtdunst über dem Horizont -->
  <rect y="1080" width="1600" height="250" fill="url(#haze)"/>

  <!-- Hintere Stadt-Silhouette (hell, in Luftperspektive) -->
  <g fill="#a9c8e0">
    <rect x="580"  y="1180" width="80"  height="150"/>
    <rect x="700"  y="1150" width="60"  height="180"/>
    <rect x="880"  y="1195" width="100" height="135"/>
    <rect x="1010" y="1160" width="65"  height="170"/>
    <rect x="1420" y="1185" width="90"  height="145"/>
    <rect x="1540" y="1150" width="60"  height="180"/>
  </g>

  <!-- Vordere Stadt-Silhouette -->
  <g fill="#8fb3d1">
    <rect x="620"  y="1225" width="90"  height="105"/>
    <rect x="730"  y="1190" width="70"  height="140"/>
    <rect x="820"  y="1245" width="110" height="85"/>
    <rect x="950"  y="1205" width="75"  height="125"/>
    <rect x="1040" y="1250" width="95"  height="80"/>
    <rect x="1470" y="1225" width="130" height="105"/>
  </g>
  <!-- ein paar spiegelnde Fenster in der Ferne -->
  <g fill="#e8f5ff" opacity="0.9">
    <rect x="745" y="1210" width="6" height="10"/>
    <rect x="765" y="1240" width="6" height="10"/>
    <rect x="965" y="1225" width="6" height="10"/>
    <rect x="985" y="1260" width="6" height="10"/>
    <rect x="1060" y="1265" width="6" height="10"/>
    <rect x="1520" y="1245" width="6" height="10"/>
  </g>

  <!-- DIE SCHULE (Hauptmotiv links, warme Tagesfarben) -->
  <g>
    <!-- Uhrturm mit Dach -->
    <rect x="268" y="960" width="100" height="150" fill="#efe9da"/>
    <rect x="358" y="960" width="10"  height="150" fill="#d9d2bf"/>
    <path d="M258 960 L318 918 L378 960 Z" fill="#4a6f92"/>
    <circle cx="318" cy="1022" r="26" fill="#fdfdf8" stroke="#4a6f92" stroke-width="3"/>
    <line x1="318" y1="1022" x2="318" y2="1005" stroke="#33506e" stroke-width="3"/>
    <line x1="318" y1="1022" x2="331" y2="1029" stroke="#33506e" stroke-width="3"/>
    <!-- Hauptgebäude -->
    <rect x="70" y="1085" width="500" height="245" fill="#efe9da"/>
    <rect x="540" y="1085" width="30" height="245" fill="#d9d2bf"/>
    <rect x="70" y="1085" width="500" height="14" fill="#4a6f92"/>
    <!-- Fensterreihen: zwei Stockwerke, Himmel spiegelt sich -->
    <g fill="#9fd0ec" stroke="#5f88a8" stroke-width="2">
      <rect x="105" y="1118" width="32" height="44"/>
      <rect x="163" y="1118" width="32" height="44"/>
      <rect x="221" y="1118" width="32" height="44"/>
      <rect x="279" y="1118" width="32" height="44"/>
      <rect x="337" y="1118" width="32" height="44"/>
      <rect x="395" y="1118" width="32" height="44"/>
      <rect x="453" y="1118" width="32" height="44"/>
      <rect x="511" y="1118" width="32" height="44"/>
      <rect x="105" y="1213" width="32" height="44"/>
      <rect x="163" y="1213" width="32" height="44"/>
      <rect x="221" y="1213" width="32" height="44"/>
      <rect x="279" y="1213" width="32" height="44"/>
      <rect x="337" y="1213" width="32" height="44"/>
      <rect x="395" y="1213" width="32" height="44"/>
      <rect x="453" y="1213" width="32" height="44"/>
      <rect x="511" y="1213" width="32" height="44"/>
    </g>
    <!-- weiße Lichtglanz-Streifen auf ein paar Fenstern -->
    <g stroke="#ffffff" stroke-width="5" opacity="0.65" stroke-linecap="round">
      <line x1="170" y1="1155" x2="188" y2="1125"/>
      <line x1="344" y1="1155" x2="362" y2="1125"/>
      <line x1="460" y1="1250" x2="478" y2="1220"/>
    </g>
    <!-- Eingang -->
    <rect x="295" y="1262" width="52" height="68" fill="#4a6f92"/>
    <rect x="303" y="1270" width="36" height="40" fill="#9fd0ec"/>
  </g>

  <!-- Boden: Schulhof-Wiese -->
  <rect y="1330" width="1600" height="270" fill="#7cae62"/>
  <rect y="1330" width="1600" height="10"  fill="#5e9349"/>
  <!-- sandiger Weg -->
  <path d="M600 1600 L680 1330 L860 1330 L1020 1600 Z" fill="#e3cf9f"/>

  <!-- Schulhof-Mauer mit Pfosten -->
  <g>
    <rect x="0" y="1305" width="640" height="28" fill="#d9d4c6"/>
    <rect x="0" y="1305" width="640" height="7"  fill="#c2bcab"/>
    <g fill="#b8b2a0">
      <rect x="40"  y="1291" width="11" height="42"/>
      <rect x="145" y="1291" width="11" height="42"/>
      <rect x="250" y="1291" width="11" height="42"/>
      <rect x="355" y="1291" width="11" height="42"/>
      <rect x="460" y="1291" width="11" height="42"/>
      <rect x="565" y="1291" width="11" height="42"/>
    </g>
  </g>

  <!-- Bäume in sattem Sommergrün -->
  <g>
    <g fill="#3f7a44">
      <ellipse cx="1490" cy="1245" rx="105" ry="82"/>
      <ellipse cx="1575" cy="1200" rx="75"  ry="62"/>
      <ellipse cx="1420" cy="1205" rx="60"  ry="48"/>
    </g>
    <g fill="#529455">
      <ellipse cx="1465" cy="1215" rx="70" ry="52"/>
      <ellipse cx="1560" cy="1180" rx="48" ry="38"/>
    </g>
    <rect x="1476" y="1290" width="18" height="60" fill="#6b4a35"/>
    <ellipse cx="615" cy="1282" rx="65" ry="48" fill="#3f7a44"/>
    <ellipse cx="600" cy="1268" rx="42" ry="30" fill="#529455"/>
    <rect x="607" y="1310" width="14" height="38" fill="#6b4a35"/>
  </g>

  <!-- Strommast mit Leitungen (das Anime-Detail schlechthin) -->
  <g>
    <rect x="1318" y="965" width="12" height="368" fill="#5c6470"/>
    <rect x="1272" y="992" width="104" height="9" fill="#5c6470"/>
    <rect x="1283" y="1030" width="82" height="8" fill="#5c6470"/>
    <circle cx="1279" cy="989"  r="4.5" fill="#e8eef4"/>
    <circle cx="1369" cy="989"  r="4.5" fill="#e8eef4"/>
    <circle cx="1289" cy="1027" r="4.5" fill="#e8eef4"/>
    <circle cx="1359" cy="1027" r="4.5" fill="#e8eef4"/>
    <path d="M1279 992 C 980 1060, 600 1072, 0 1022"      fill="none" stroke="#3c4654" stroke-width="3"/>
    <path d="M1289 1032 C 1020 1092, 620 1102, 0 1060"    fill="none" stroke="#3c4654" stroke-width="2.5"/>
    <path d="M1369 992 C 1460 1004, 1545 1012, 1600 1016" fill="none" stroke="#3c4654" stroke-width="3"/>
    <path d="M1359 1032 C 1450 1044, 1540 1052, 1600 1056" fill="none" stroke="#3c4654" stroke-width="2.5"/>
  </g>
</svg>
